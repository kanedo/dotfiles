# kitty.conf — terminal configuration with gruvbox dark medium colors.

# Font
font_family      family="JetBrainsMono Nerd Font Mono" style=ExtraLight
bold_font        family="JetBrainsMono Nerd Font Mono" style=Light
italic_font      family="JetBrainsMono Nerd Font Mono" style="ExtraLight Italic"
bold_italic_font family="JetBrainsMono Nerd Font Mono" style="Light Italic"
font_size        12.0
text_composition_strategy platform
macos_colorspace default

# Window
window_padding_width 6
hide_window_decorations titlebar-only
remember_window_size  yes
enabled_layouts tall, stack

# Tabs
tab_bar_edge top
tab_bar_style separator
tab_separator " ┇ "
tab_bar_min_tabs 1

# Tab cycling
map cmd+` next_tab
map cmd+shift+` previous_tab

# Word navigation with alt+arrows (sends ESC+b / ESC+f — readline/zle backward/forward word)
map alt+left  send_text all \x1bb
map alt+right send_text all \x1bf

# Behavior
scrollback_lines 10000
enable_audio_bell no
copy_on_select yes
macos_option_as_alt yes

# Startup: attach to local tmux session 'base' (or create it).
startup_session default.session

# Shortcuts
# ctrl+cmd+c — new tab ssh'd into slurm2-login, attaching/creating tmux 'base'.
map ctrl+cmd+c launch --type=tab --tab-title=slurm2 kitten ssh slurm2-login -t "tmux attach -t base || tmux new -s base"

# Cursor
cursor_shape block
cursor_blink_interval 0

# Gruvbox dark (medium) — https://github.com/morhetz/gruvbox
foreground            #ebdbb2
background            #1f2326
selection_foreground  #ebdbb2
selection_background  #504945

cursor                #ebdbb2
cursor_text_color     #1f2326

url_color             #83a598

# Normal
color0                #1f2326
color1                #cc241d
color2                #98971a
color3                #d79921
color4                #458588
color5                #b16286
color6                #689d6a
color7                #a89984

# Bright
color8                #928374
color9                #fb4934
color10               #b8bb26
color11               #fabd2f
color12               #83a598
color13               #d3869b
color14               #8ec07c
color15               #ebdbb2

# Tab bar colors
active_tab_foreground   #1f2326
active_tab_background   #d79921
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
